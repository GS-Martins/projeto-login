<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="estilos/midea-query.css">
</head>
<body>
   <main>
       
                <section id="login">
                    <div id="img"></div>
                    <div id="cont">
                        <h1>Login</h1>
                        <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                        <form action="login.php" method="post">
                            <div class="campo">
                                <span class="material-symbols-outlined">person</span>
                                <input type="email" name="login" id="ilogin" placeholder="seu e-mail" autocomplete="email" required maxlength="10">
                                <label for="ilogin">Login</label>
                            </div>
                            <div div class="campo">
                                <span class="material-symbols-outlined">vpn_key</span>
                                <input type="password" name="senha" id="isenha" placeholder="sua senha" autocomplete="current-password" required minlength="8" maxlength="20">
                                <label for="senha">Senha</label>
                            </div>
                            <input type="submit" value="Entrar">
                            <a href="esqueci.html" class="botao">
                                Esqueci a senha <i class="material-symbols-outlined"> mail </i>
                            </a>
                        </form> 
                        
                    </div>
                </section>
                
       
   </main>
</body>
</html>
