<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <main>
        <section>
            <div id="img"></div>
            <div id="cont">
                <h1>Login</h1>
                <p id="texto">Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post">

                    <p class="p1">
                        <span class="material-symbols-outlined">person </span>
                        <label for="ilogin"></label>
                         <input type="text" name="login" id="ilogin" placeholder="seu e-mail" required>
                    </p>
                    <p class="p1">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <label for="isenha"></label>
                         <input type="password" name="senha" id="isenha" placeholder="sua senha" required>
                    </p>
                    
                    <p class="p2">
                        <input type="submit" value="Entrar" id="entrar" >
                    </p>
                  
                    <p class="p2">
                       <input type="button" value="Esqueci a senha" id="es">
                    </p>
                </form>

            </div>
        </section>
    </main>
    
</body>
</html>
